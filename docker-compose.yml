version: '3.8'
services:

  mariadb:
    image: mariadb:10.11
    container_name: fraud_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fraud_detection
      MYSQL_USER: fraud_user
      MYSQL_PASSWORD: fraud_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - fraud_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: fraud_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fraud_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: redis-server --appendonly yes

  fastapi_backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fraud_detection_api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=mariadb
      - DB_USER=fraud_user
      - DB_PASSWORD=fraud_password
      - DB_NAME=fraud_detection
    volumes:
      - ./models:/app/models:ro
      - ./data/preprocessed:/app/data/preprocessed:ro
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - fraud_network
    restart: unless-stopped

  streamlit_frontend:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: fraud_detection_ui
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - PYTHONUNBUFFERED=1
    depends_on:
      fastapi_backend:
        condition: service_healthy
    networks:
      - fraud_network
    restart: unless-stopped

networks:
  fraud_network:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
  models:
  preprocessed_data:
