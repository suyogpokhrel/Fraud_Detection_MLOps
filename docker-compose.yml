version: '3.8'

services:
  fastapi_backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fraud_detection_api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/app/models:ro
      - ./data/preprocessed:/app/data/preprocessed:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - fraud_network
    restart: unless-stopped

  streamlit_frontend:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: fraud_detection_ui
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_LOGGER_LEVEL=info
      - PYTHONUNBUFFERED=1
    depends_on:
      fastapi_backend:
        condition: service_healthy
    networks:
      - fraud_network
    restart: unless-stopped

networks:
  fraud_network:
    driver: bridge

volumes:
  models:
  preprocessed_data:
